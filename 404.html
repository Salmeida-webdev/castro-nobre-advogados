<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Página não encontrada | Castro Nobre Advocacia</title>
    <meta
      name="description"
      content="A página que você tentou acessar não foi encontrada. Retorne para a página inicial da Castro Nobre Advocacia."
    />
    <meta name="robots" content="noindex, follow" />

    <link rel="icon" href="assets/favicon/favicon.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --color-black: #050607;
        --color-graphite: #0b0d10;
        --color-gold: #b89765;
        --color-gold-soft: #c5a880;
        --color-offwhite: #f3eee5;
        --color-muted: rgba(243, 238, 229, 0.68);
        --color-border: rgba(255, 255, 255, 0.06);
        --font-title: "Cormorant Garamond", Georgia, serif;
        --font-body: "Inter", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 32px;
        overflow-x: hidden;
        background:
          radial-gradient(
            circle at 18% 12%,
            rgba(184, 151, 101, 0.16),
            transparent 34%
          ),
          radial-gradient(
            circle at 78% 72%,
            rgba(197, 168, 128, 0.08),
            transparent 36%
          ),
          linear-gradient(135deg, #050607 0%, #0b0d10 52%, #06080b 100%);
        color: var(--color-offwhite);
        font-family: var(--font-body);
      }

      .not-found {
        position: relative;
        width: min(100%, 920px);
        padding: clamp(40px, 8vw, 88px);
        overflow: hidden;
        border: 1px solid var(--color-border);
        border-radius: 36px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.045),
          rgba(255, 255, 255, 0.018)
        );
        box-shadow: 0 32px 100px rgba(0, 0, 0, 0.46);
        text-align: center;
      }

      .not-found::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.055),
          transparent
        );
      }

      .not-found__logo {
        display: block;
        width: min(220px, 58vw);
        margin: 0 auto 40px;
      }

      .not-found__code {
        display: inline-flex;
        margin-bottom: 18px;
        color: var(--color-gold-soft);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0 auto;
        font-family: var(--font-title);
        font-size: clamp(3.2rem, 8vw, 6.8rem);
        font-weight: 600;
        line-height: 0.92;
        letter-spacing: -0.035em;
      }

      p {
        max-width: 620px;
        margin: 24px auto 0;
        color: var(--color-muted);
        font-size: clamp(1rem, 1.6vw, 1.12rem);
        line-height: 1.75;
      }

      .not-found__actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 40px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 26px;
        border-radius: 999px;
        font-size: 0.84rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-decoration: none;
        transition:
          transform 720ms cubic-bezier(0.22, 1, 0.36, 1),
          border-color 720ms cubic-bezier(0.22, 1, 0.36, 1),
          background 720ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .btn--primary {
        border: 1px solid rgba(197, 168, 128, 0.42);
        background: linear-gradient(
          135deg,
          var(--color-gold),
          var(--color-gold-soft)
        );
        color: #11100d;
      }

      .btn--ghost {
        border: 1px solid var(--color-border);
        background: rgba(255, 255, 255, 0.035);
        color: var(--color-offwhite);
      }

      .btn:hover {
        transform: translateY(-3px);
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .not-found {
          padding: 40px 24px;
          border-radius: 28px;
        }

        .not-found__actions {
          display: grid;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <main class="not-found" aria-labelledby="page-title">
      <img
        class="not-found__logo"
        src="assets/images/logo-castro-nobre-gold.png"
        alt="Castro Nobre Advocacia"
      />

      <span class="not-found__code">Erro 404</span>

      <h1 id="page-title">Página não encontrada.</h1>

      <p>
        O endereço acessado não está disponível ou pode ter sido movido. Retorne
        à página inicial ou agende uma consulta institucional com a Castro Nobre
        Advocacia.
      </p>

      <div class="not-found__actions">
        <a class="btn btn--primary" href="/">Voltar para o início</a>
        <a
          class="btn btn--ghost"
          href="https://wa.me/5583998326680"
          target="_blank"
          rel="noopener"
        >
          Agendar consulta
        </a>
      </div>
    </main>
  </body>
</html>
